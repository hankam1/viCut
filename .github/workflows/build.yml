name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist: dist:win
            artifact: "apps/desktop/release/*.exe"
          - os: macos-latest
            dist: dist:mac
            artifact: "apps/desktop/release/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Установщики собираются только на тег или ручной запуск — пуш в main
      # ограничивается проверкой сборки.
      - if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: pnpm --filter @vicut/desktop ${{ matrix.dist }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vicut-${{ matrix.os }}
          path: ${{ matrix.artifact }}
